version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - ./web:/app/web
      - ./server/public:/app/server/public
      - ./server/audio:/app/server/audio
    environment:
      - NODE_ENV=production
      - PORT=8000
    restart: unless-stopped
